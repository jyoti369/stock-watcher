name: tests

# Runs the offline logic tests on every code push, so a bad change is caught
# before it reaches the deployed dashboard. Fast + cheap (no network).
on:
  push:
    paths:
      - "src/**"
      - "tests/**"
      - "dashboard.py"
      - "requirements*.txt"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-watcher.txt
      - run: pip install -r requirements-watcher.txt pytest
      - run: python -m pytest tests/ -q
