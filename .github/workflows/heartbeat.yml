name: daily-heartbeat

# One digest a day after NSE close, so you always know the watcher is alive.
# Cron is UTC: 10:15 UTC ≈ 15:45 IST (just after the 15:30 close), weekdays.
on:
  schedule:
    - cron: "15 10 * * 1-5"
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-watcher.txt
      - run: pip install -r requirements-watcher.txt
      - name: send daily digest
        env:
          STOCKWATCH_TG_TOKEN: ${{ secrets.STOCKWATCH_TG_TOKEN }}
          STOCKWATCH_TG_CHAT: ${{ secrets.STOCKWATCH_TG_CHAT }}
          STOCKWATCH_SMTP_USER: ${{ secrets.STOCKWATCH_SMTP_USER }}
          STOCKWATCH_SMTP_PASS: ${{ secrets.STOCKWATCH_SMTP_PASS }}
          STOCKWATCH_EMAIL_TO: ${{ secrets.STOCKWATCH_EMAIL_TO }}
        run: |
          python -m src.repo_state import
          python -m src.heartbeat
