# Fly.io config. Change `app` to a globally-unique name before deploying
# (e.g. stock-watcher-jyoti). `fly launch` can also generate/adjust this.
app = "stock-watcher-CHANGE-ME"
primary_region = "sin"          # Singapore — lowest latency from India

[build]

[env]
  PORT = "8080"
  STOCKWATCH_INTERVAL_SEC = "900"   # watcher runs every 15 min

[http_service]
  internal_port = 8080
  force_https = true
  # keep one machine always running so the 24/7 alert watcher never sleeps
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"            # streamlit + pandas/scipy; drop to 512mb to save cost if stable

# persistent SQLite (watchlist, rules, alert history) survives redeploys
[mounts]
  source = "stockdata"
  destination = "/app/data"
